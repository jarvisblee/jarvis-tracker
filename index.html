<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    padding: 24px;
    min-height: 100vh;
  }
  .header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 8px;
  }
  .header h1 { font-size: 24px; font-weight: 700; color: #f0f6fc; }
  .header .emoji { font-size: 22px; }
  .subtitle { font-size: 13px; color: #7d8590; margin-bottom: 16px; }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 12px;
    color: #7d8590;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 4px;
    font-weight: 600;
  }
  .filter-btn {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 16px;
    padding: 5px 14px;
    color: #9da5b0;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { background: #30363d; color: #f0f6fc; }
  .filter-btn.selected { border-color: #58a6ff; color: #58a6ff; background: #1a2332; }
  .filter-btn.selected.active { border-color: #3fb950; color: #3fb950; background: #23312e; }
  .filter-btn.selected.pending { border-color: #d29922; color: #d29922; background: #2d2a1e; }
  .filter-btn.selected.blocked { border-color: #f85149; color: #f85149; background: #2d1b1e; }
  .filter-btn.selected.done { border-color: #58a6ff; color: #58a6ff; background: #1a2332; }
  .filter-separator { width: 1px; height: 20px; background: #30363d; margin: 0 8px; }

  /* Jarvis Details Buttons */
  .jarvis-details {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .detail-btn {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 8px 14px;
    color: #58a6ff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .detail-btn:hover { background: #30363d; border-color: #58a6ff; }
  .detail-btn .icon { font-size: 14px; }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 1000;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
    overflow-y: auto;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    max-width: 800px;
    width: 100%;
    max-height: 80vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid #30363d;
    background: #21262d;
  }
  .modal-title { font-size: 16px; font-weight: 600; color: #f0f6fc; }
  .modal-close {
    background: none;
    border: none;
    color: #7d8590;
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .modal-close:hover { background: #30363d; color: #f0f6fc; }
  .modal-content {
    padding: 20px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.6;
  }
  .modal-content pre {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 12px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: 'SF Mono', Monaco, 'Courier New', monospace;
    font-size: 12px;
  }
  .cron-job {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .cron-job-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .cron-job-name { font-weight: 600; color: #f0f6fc; }
  .cron-job-status { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .cron-job-status.enabled { background: #23312e; color: #3fb950; }
  .cron-job-status.disabled { background: #2d1b1e; color: #f85149; }
  .cron-job-schedule { font-family: 'SF Mono', Monaco, monospace; font-size: 12px; color: #d29922; margin-bottom: 4px; }
  .cron-job-target { font-size: 11px; color: #7d8590; }

  .stats-bar {
    display: flex;
    gap: 24px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .stat {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 14px 20px;
    min-width: 130px;
  }
  .stat-value { font-size: 28px; font-weight: 700; line-height: 1.2; }
  .stat-label { font-size: 12px; color: #7d8590; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .stat-value.active { color: #3fb950; }
  .stat-value.pending { color: #d29922; }
  .stat-value.blocked { color: #f85149; }
  .stat-value.done { color: #58a6ff; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(370px, 1fr));
    gap: 16px;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 20px;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #58a6ff; }
  .card.hidden { display: none; }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .card-title { font-size: 16px; font-weight: 600; color: #f0f6fc; }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 0.3px;

  .badge.active { background: #23312e; color: #3fb950; }
  .badge.pending { background: #2d2a1e; color: #d29922; }
  .badge.blocked { background: #2d1b1e; color: #f85149; }
  .badge.done { background: #1a2332; color: #58a6ff; }
  .card-category {
    font-size: 11px;
    color: #7d8590;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .card-desc { font-size: 13px; color: #9da5b0; line-height: 1.5; margin-bottom: 14px; }
  .progress-bar-container {
    background: #21262d;
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .progress-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
  }
  .progress-bar.active { background: linear-gradient(90deg, #238636, #3fb950); }
  .progress-bar.pending { background: linear-gradient(90deg, #9e6a03, #d29922); }
  .progress-bar.blocked { background: linear-gradient(90deg, #da3633, #f85149); }
  .progress-bar.done { background: linear-gradient(90deg, #1f6feb, #58a6ff); }
  .progress-label {
    font-size: 12px;
    color: #7d8590;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .tasks { list-style: none; padding: 0; }
  .tasks li {
    font-size: 13px;
    padding: 4px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #9da5b0;
  }
  .tasks li.done { color: #7d8590; text-decoration: line-through; }
  .check { font-size: 14px; flex-shrink: 0; }
  .check.done { color: #3fb950; }
  .check.todo { color: #30363d; }
  .priority-indicator {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }
  .priority-indicator.high { background: #f85149; }
  .priority-indicator.medium { background: #d29922; }
  .priority-indicator.low { background: #3fb950; }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .started { font-size: 11px; color: #484f58; }
  .footer {
    margin-top: 32px;
    text-align: center;
    font-size: 12px;
    color: #484f58;
  }

function showModal(type) {
  const overlay = document.getElementById('modal-overlay');

    case 'cron':

          <div class="cron-job-schedule">${job.schedule} (${job.tz})</div>
          <div class="cron-job-target">→ ${job.target}${job.model ? ' • ' + job.model : ''}</div>
        </div>`).join('');
      break;
    default:
      title.textContent = { soul: '🧠 Soul', agents: '📋 Agents', tools: '🔧 Tools', memory: '💾 Memory' }[type];
      content.innerHTML = '<pre>' + escapeHtml(jarvisData[type]) + '</pre>';
  }
  overlay.classList.add('active');
}
function closeModal(event) {
  if (!event || event.target === document.getElementById('modal-overlay'))

}
function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

// Filter state
let activeFilters = { status: 'all', category: 'all' };

function applyFilters() {
  const cards = document.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const status = card.dataset.status;
    const category = card.dataset.category;
    const statusMatch = activeFilters.status === 'all' || status === activeFilters.status;
    const categoryMatch = activeFilters.category === 'all' || category === activeFilters.category;
    if (statusMatch && categoryMatch) {
      card.classList.remove('hidden');
      visible++;
    } else {
      card.classList.add('hidden');
    }
  });
  document.getElementById('filter-count').textContent = `Showing ${visible} of ${data.projects.length} projects`;
}

// Filter button handlers
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const filterType = btn.dataset.filter;
    const value = btn.dataset.value;
    activeFilters[filterType] = value;
    // Update button states
    document.querySelectorAll(`.filter-btn[data-filter="${filterType}"]`).forEach(b => {
      b.classList.remove('selected');
    });
    btn.classList.add('selected');
    applyFilters();
  });
});

document.getElementById('updated').innerHTML = `Last updated: ${new Date(data.lastUpdated).toLocaleString('en-US', {
  weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
  hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Taipei'
})} (Taipei) &nbsp;·&nbsp; <span id="filter-count"></span>`;

const counts = { active: 0, pending: 0, blocked: 0, done: 0 };
data.projects.forEach(p => counts[p.status] = (counts[p.status] || 0) + 1);

const totalTasks = data.projects.reduce((s, p) => s + (p.tasks?.length || 0), 0);
const doneTasks = data.projects.reduce((s, p) => s + (p.tasks?.filter(t => t.done).length || 0), 0);

document.getElementById('stats').innerHTML = `
  <div class="stat"><div class="stat-value active">${counts.active}</div><div class="stat-label">Active</div></div>
  <div class="stat"><div class="stat-value pending">${counts.pending}</div><div class="stat-label">Pending</div></div>
  <div class="stat"><div class="stat-value blocked">${counts.blocked}</div><div class="stat-label">Blocked</div></div>
  <div class="stat"><div class="stat-value done">${counts.done}</div><div class="stat-label">Done</div></div>
  <div class="stat"><div class="stat-value" style="color:#a371f7">${doneTasks}/${totalTasks}</div><div class="stat-label">Tasks</div></div>
`;

const grid = document.getElementById('grid');
data.projects.forEach(p => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.status = p.status;
  card.dataset.category = p.category;
  card.innerHTML = `
    <div class="card-header">
      <div class="card-title"><span class="priority-indicator ${p.priority}"></span>${p.name}</div>
      <span class="badge ${p.status}">${p.status}</span>
    </div>
    <div class="card-meta">
      <span class="card-category">${p.category}</span>
      <span class="started">📅 ${p.started}</span>
    </div>
    <div class="card-desc">${p.description}</div>
    <div class="progress-label"><span>Progress</span><span>${p.progress}%</span></div>
    <div class="progress-bar-container"><div class="progress-bar ${p.status}" style="width:${p.progress}%"></div></div>
    ${p.tasks ? `<ul class="tasks">${p.tasks.map(t =>
      `<li class="${t.done ? 'done' : ''}"><span class="check ${t.done ? 'done' : 'todo'}">${t.done ? '✓' : '○'}</span>${t.text}</li>`
    ).join('')}</ul>` : ''}`;
  grid.appendChild(card);
});

document.getElementById('footer').textContent = `${data.projects.length} projects · ${doneTasks}/${totalTasks} tasks complete · ${jarvisData.cronJobs.length} cron jobs`;
document.getElementById('filter-count').textContent = `Showing ${data.projects.length} of ${data.projects.length} projects`;
